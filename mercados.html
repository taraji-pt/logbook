<!DOCTYPE html>
<html lang="pt">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Mercados | Betting Logbook</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/flag-icons/css/flag-icons.min.css"
    >

</head>

<body>

    <div class="app-layout">

        <div id="sidebar-container"></div>

        <main class="main-content">

            <header class="page-header">

                <div class="page-title">

                    <h1>Mercados</h1>

                    <p>
                        Performance por mercado
                    </p>

                </div>

            </header>

            <div class="page-content">

                <div class="kpi-grid">

                    <div class="kpi-card">
                        <div class="kpi-label">
                            Markets Tracked
                        </div>
                        <div
                            id="marketsTrackedKpi"
                            class="kpi-value"
                        >
                            -
                        </div>
                    </div>

                    <div class="kpi-card">
                        <div class="kpi-label">
                            Best Market
                        </div>
                        <div
                            id="bestMarketKpi"
                            class="kpi-value"
                        >
                            -
                        </div>
                    </div>

                    <div class="kpi-card">
                        <div class="kpi-label">
                            Worst Market
                        </div>
                        <div
                            id="worstMarketKpi"
                            class="kpi-value"
                        >
                            -
                        </div>
                    </div>

<div class="kpi-card">
    <div class="kpi-label">
        Highest Profit
    </div>

    <div
        id="highestProfitMarketKpi"
        class="kpi-value"
    >
        -
    </div>

    <div
        id="highestProfitMarketName"
        class="table-subtitle"
    ></div>
</div>

                    <div class="kpi-card">
    <div class="kpi-label">
        Highest ROI
    </div>

    <div
        id="highestRoiMarketKpi"
        class="kpi-value"
    >
        -
    </div>

    <div
        id="highestRoiMarketName"
        class="table-subtitle"
    ></div>
</div>

<div class="kpi-card">
    <div class="kpi-label">
        Highest Win Rate
    </div>

    <div
        id="highestWinRateMarketKpi"
        class="kpi-value"
    >
        -
    </div>

    <div
        id="highestWinRateMarketName"
        class="table-subtitle"
    ></div>
</div>

                </div>

<div class="markets-charts-grid">

    <section class="chart-card">

        <div class="panel-header">

            <div>

                <div class="panel-title">
                    Profit by Market
                </div>

                <div class="panel-description">
                    Which markets generate the most profit?
                </div>

            </div>

        </div>

        <div class="chart-container">

            <canvas
                id="marketProfitChart"
            ></canvas>

        </div>

    </section>

    <section class="chart-card">

        <div class="panel-header">

            <div>

                <div class="panel-title">
                    Yield by Market
                </div>

                <div class="panel-description">
                    Which markets are the most efficient?
                </div>

            </div>

        </div>

        <div class="chart-container">

            <canvas
                id="marketYieldChart"
            ></canvas>

        </div>

    </section>

</div>
                
                <section class="table-section">

                    <div class="panel-header">

                        <div class="panel-title">
                            Market Performance
                        </div>

                    </div>

                    <div
                        id="marketsTableContainer"
                    ></div>

                    <div
                        id="marketsPaginationContainer"
                    ></div>

                </section>

            </div>

        </main>

    </div>

    <script src="js/sidebar.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/calculations.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/mercados.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
