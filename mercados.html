<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mercados</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/flag-icons/css/flag-icons.min.css">

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="app">

    <aside class="sidebar">

        <div class="logo">

            <div class="logo-icon">⚽</div>

            <div>

                <div class="logo-title">
                    WORLD CUP
                </div>

                <div class="logo-subtitle">
                    BETTING LOGBOOK
                </div>

            </div>

        </div>

        <button id="toggleSidebar">
            ☰
        </button>

        <nav class="menu">

            <a href="index.html" class="menu-item">
                Dashboard
            </a>

            <a href="apostas.html" class="menu-item">
                Apostas
            </a>

            <a href="mercados.html" class="menu-item active">
                Mercados
            </a>

            <a href="estatisticas.html" class="menu-item">
                Estatísticas
            </a>

            <a href="bankroll.html" class="menu-item">
                Bankroll
            </a>

        </nav>

    </aside>

    <main class="main">

        <div class="page-header">

            <div>

                <h1>
                    Mercados
                </h1>

                <p>
                    Performance por mercado
                </p>

            </div>

        </div>

        <!-- TOPO -->

        <section class="markets-layout">

            <div class="panel market-chart-panel">

                <div class="panel-title">
                    Evolução Mercados
                </div>

                <canvas id="marketsChart"></canvas>

            </div>

            <div class="markets-side">

                <div class="panel market-kpi">

                    <div class="kpi-label">
                        Melhor Profit
                    </div>

                    <div
                        class="kpi-value positive"
                        id="bestMarketProfitValue">

                        --

                    </div>

                    <div
                        class="market-kpi-name"
                        id="bestMarketProfitName">

                        --

                    </div>

                </div>

                <div class="panel market-kpi">

                    <div class="kpi-label">
                        Melhor ROI
                    </div>

                    <div
                        class="kpi-value positive"
                        id="bestMarketROIValue">

                        --

                    </div>

                    <div
                        class="market-kpi-name"
                        id="bestMarketROIName">

                        --

                    </div>

                </div>

                <div class="panel market-kpi">

                    <div class="kpi-label">
                        Mercados Diferentes
                    </div>

                    <div
                        class="kpi-value"
                        id="marketsCount">

                        --

                    </div>

                </div>

            </div>

        </section>

        <!-- RESUMO -->

        <div class="panel">

            <div class="panel-title">
                Resumo Mercados
            </div>

            <div class="markets-table-wrapper">

                <table
                    class="markets-table"
                    id="marketsTable">

                    <thead>

                        <tr>

                            <th>
                                Mercado
                            </th>

                            <th>
                                Bets
                            </th>

                            <th>
                                Win Rate
                            </th>

                            <th>
                                Profit
                            </th>

                            <th>
                                ROI
                            </th>

                        </tr>

                    </thead>

                    <tbody>

                    </tbody>

                </table>

            </div>

        </div>

    </main>

</div>

<script src="js/mercados.js"></script>
<script src="js/sidebar.js"></script>

</body>

</html>
