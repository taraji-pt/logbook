<!DOCTYPE html>
<html lang="pt">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Betting Logbook</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <div class="app-layout">

        <div id="sidebar-container"></div>

        <main class="main-content">

            <header class="page-header">

                <div class="page-title">
                    <h1>Dashboard</h1>
                    <p>Visão geral da performance</p>
                </div>

            </header>

            <div class="page-content">

<div class="kpi-grid">

    <div class="kpi-card">
        <div class="kpi-label">Total Bets</div>
        <div id="totalBetsValue" class="kpi-value">-</div>
    </div>

    <div class="kpi-card">
        <div class="kpi-label">Current Bankroll</div>
        <div id="bankrollValue" class="kpi-value">-</div>
    </div>

    <div class="kpi-card">
        <div class="kpi-label">Profit</div>
        <div id="profitValue" class="kpi-value">-</div>
    </div>

    <div class="kpi-card">
        <div class="kpi-label">ROI</div>
        <div id="roiValue" class="kpi-value">-</div>
    </div>

    <div class="kpi-card">
        <div class="kpi-label">Yield</div>
        <div id="yieldValue" class="kpi-value">-</div>
    </div>

    <div class="kpi-card">
        <div class="kpi-label">Win Rate</div>
        <div id="winRateValue" class="kpi-value">-</div>
    </div>

</div>

<div
    class="content-grid"
    style="
        grid-template-columns: 2fr 1fr;
        margin-top: 24px;
    "
>

    <div class="chart-card">

        <div class="panel-header">
            <div class="panel-title">
                Bankroll Evolution
            </div>
        </div>

        <div class="chart-container">
            <canvas id="bankrollChart"></canvas>
        </div>

    </div>

    <section class="recent-bets-section">

    <div class="panel-header">

        <div class="panel-title">
            Recent Bets
        </div>

    </div>

    <div
        id="recentBetsGrid"
        class="recent-bets-grid"
    ></div>

</section>

    <div class="chart-card">

        <div class="panel-header">
            <div class="panel-title">
                Results Distribution
            </div>
        </div>

        <div class="chart-container">
            <canvas id="resultsChart"></canvas>
        </div>

    </div>

</div>

                    </div>

                </div>

            </div>

        </main>

    </div>

<script src="js/sidebar.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/calculations.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/app.js"></script>

</body>

</html>
