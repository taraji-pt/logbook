<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons/css/flag-icons.min.css">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="app">


<aside class="sidebar">

    <div class="logo">

        <div class="logo-icon">⚽</div>

        <div>

            <div class="logo-title">
                WORLD CUP
            </div>

            <div class="logo-subtitle">
                BETTING LOGBOOK
            </div>

        </div>

    </div>

    <nav class="menu">

        <a href="index.html" class="menu-item">
            Dashboard
        </a>

        <a href="apostas.html" class="menu-item active">
            Apostas
        </a>

        <a href="mercados.html" class="menu-item">
            Mercados
        </a>

        <a href="estatisticas.html" class="menu-item">
            Estatísticas
        </a>

        <a href="bankroll.html" class="menu-item">
            Bankroll
        </a>

    </nav>

</aside>

<main class="main">

    <div class="page-header">

        <div>

            <h1>
                Apostas
            </h1>

            <p>
                Histórico completo
            </p>

        </div>

    </div>

    <div class="panel">

        <div class="filters">

            <select id="marketFilter">

                <option value="">
                    Todos os Mercados
                </option>

            </select>

            <select id="resultFilter">

                <option value="">
                    Todos os Resultados
                </option>

                <option value="WIN">
                    WIN
                </option>

                <option value="LOSS">
                    LOSS
                </option>

                <option value="HALF WIN">
                    HALF WIN
                </option>

                <option value="HALF LOSS">
                    HALF LOSS
                </option>

                <option value="VOID">
                    VOID
                </option>

            </select>

            <input
                type="text"
                id="searchTeam"
                placeholder="Pesquisar equipa..."
            >

<select id="sortFilter">

    <option value="date_desc">
        Mais recentes
    </option>

    <option value="date_asc">
        Mais antigos
    </option>

    <option value="profit_desc">
        Maior lucro
    </option>

    <option value="profit_asc">
        Maior prejuízo
    </option>

    <option value="odd_desc">
        Maior odd
    </option>

    <option value="odd_asc">
        Menor odd
    </option>

</select>

        </div>

    </div>

    <div
        id="betsContainer"
        class="bets-container"
    >

    </div>

</div>
